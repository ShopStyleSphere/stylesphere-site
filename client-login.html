<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere Client Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

.container{
  display:flex;
  height:100vh;
}

.left, .right{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
}

.left{
  background:linear-gradient(135deg,#111,#1c1c1c);
}

.right{
  background:#0f1115;
}

h1{
  color:gold;
  font-size:50px;
}

.card{
  margin-top:20px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#222,#333);
}

input{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.error{
  color:#ff6b6b;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <h1>BEYOND REWARDS</h1>
  <p>World Elite Members Club</p>

  <div class="card">
    <p>Premium StyleSphere Account</p>
  </div>
</div>

<div class="right">
  <h2>Client Login</h2>

  <input id="email" type="email" placeholder="Enter your email">
  <input id="password" type="password" placeholder="Enter your password">

  <div id="error" class="error"></div>

  <button class="btn" onclick="loginNow()">LOGIN</button>
</div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginNow = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.textContent = "";

  if (!email || !password) {
    error.textContent = "Please enter email and password.";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);

    // نجاح تسجيل الدخول
    window.location.href = "client-dashboard.html";

  } catch (err) {

    // أهم جزء 👇
    if (err.code === "auth/user-not-found") {
      error.textContent = "Account not found.";
    } 
    else if (err.code === "auth/wrong-password") {
      error.textContent = "Wrong password.";
    } 
    else {
      error.textContent = err.message;
    }
  }
};

</script>

</body>
</html>
