<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere Client Login</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  width:100%;
  min-height:100vh;
  background:#000;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

.page{
  width:100vw;
  height:100vh;
  position:relative;
  background:url("login-bg.png") center center / cover no-repeat;
}

/* LOGIN FORM AREA */
.login-form{
  position:absolute;
  right:8.5%;
  top:37%;
  width:38%;
  max-width:560px;
}

.field{
  width:100%;
  height:58px;
  margin-bottom:28px;
  background:transparent;
  border:1px solid rgba(255,199,59,.85);
  border-radius:8px;
  color:white;
  font-size:17px;
  padding:0 55px;
  outline:none;
  box-shadow:0 0 18px rgba(255,197,43,.35);
}

.field::placeholder{
  color:rgba(255,255,255,.65);
}

.icon{
  position:absolute;
  left:18px;
  color:#d7a52f;
  font-size:22px;
}

.email-icon{
  top:18px;
}

.lock-icon{
  top:104px;
}

.eye{
  position:absolute;
  right:18px;
  top:104px;
  color:#d7a52f;
  font-size:22px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#f3d063;
  font-size:14px;
  margin-top:-10px;
  margin-bottom:28px;
}

.login-btn{
  width:100%;
  height:70px;
  border:0;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(90deg,#b9780d,#ffe979,#b8790d);
  color:#111;
  font-size:22px;
  font-weight:900;
  letter-spacing:6px;
  box-shadow:0 0 30px rgba(255,202,38,.8);
}

.socials{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:70px;
}

.socials button{
  height:56px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(214,164,48,.8);
  border-radius:7px;
  color:#f3d063;
  font-weight:bold;
  font-size:15px;
}

.create{
  margin-top:22px;
  text-align:center;
  color:#fff;
  font-size:15px;
}

.create a{
  color:#f6c94a;
  font-weight:bold;
  text-decoration:underline;
}

/* MOBILE */
@media(max-width:900px){
  body{
    overflow:auto;
  }

  .page{
    min-height:100vh;
    background-size:cover;
    background-position:center top;
  }

  .login-form{
    right:6%;
    left:6%;
    top:45%;
    width:auto;
  }

  .field{
    height:52px;
  }

  .login-btn{
    height:60px;
  }
}
</style>
</head>

<body>

<div class="page">

  <form class="login-form">

    <span class="icon email-icon">✉</span>
    <input class="field" type="email" placeholder="Enter your email">

    <span class="icon lock-icon">🔒</span>
    <input class="field" type="password" placeholder="Enter your password">
    <span class="eye">👁</span>

    <div class="row">
      <label><input type="checkbox" checked> REMEMBER ME</label>
      <span>Forgot Password?</span>
    </div>

    <button class="login-btn" type="button">LOGIN →</button>

    <div class="socials">
      <button type="button">G&nbsp; GOOGLE</button>
      <button type="button">&nbsp; APPLE</button>
      <button type="button">f&nbsp; FACEBOOK</button>
    </div>

    <div class="create">
      Don’t have an account?
      <a>Create Account</a>
    </div>

  </form>

</div>

</body>
</html>
