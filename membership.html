<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleSphere VIP Membership</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:#fff;
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  height:100vh;
  background:#0b0b0b;
  border-right:1px solid rgba(255,215,0,.15);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#ffd700;
  margin-bottom:30px;
}

.menu a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  color:#aaa;
  text-decoration:none;
  transition:.2s;
}

.menu a:hover,
.menu a.active{
  background:linear-gradient(90deg,#ffd70033,#0000);
  color:#fff;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

/* ===== CARD ===== */
.card{
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:linear-gradient(135deg,#111,#000);
  border:1px solid rgba(255,215,0,.2);
  box-shadow:0 0 25px rgba(255,215,0,.2);
  margin-bottom:25px;
}

.card-title{
  font-size:12px;
  opacity:.6;
}

.card-level{
  font-size:28px;
  font-weight:700;
  margin-top:10px;
}

.card-user{
  margin-top:20px;
  font-size:14px;
  opacity:.8;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.box{
  background:#0f0f0f;
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,.05);
  transition:.2s;
}

.box:hover{
  transform:translateY(-3px);
  border-color:#ffd70055;
}

.box h3{
  font-size:14px;
  margin-bottom:10px;
  opacity:.7;
}

.box p{
  font-size:22px;
  font-weight:600;
}

/* ===== STATUS ===== */
.status{
  position:absolute;
  top:20px;
  right:30px;
  background:#0f0;
  color:#000;
  padding:8px 15px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .sidebar{
    display:none;
  }
}
</style>

</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="logo">STYLESPHERE</div>

  <div class="menu">
    <a href="client-dashboard.html">Dashboard</a>
    <a href="wallet.html">Wallet</a>
    <a href="rewards.html">Rewards</a>
    <a href="qr-access.html">QR Access</a>
    <a href="nfc-card.html">NFC Card</a>
    <a href="activity.html">Activity</a>
    <a href="membership.html" class="active">Membership</a>
    <a href="#">Settings</a>
    <a href="#">Logout</a>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

<div class="status">LIVE</div>

<h1 style="margin-bottom:25px;">VIP Membership Center</h1>

<!-- ===== CARD ===== -->
<div class="card member-card" data-vip-card>

  <div class="card-title">DIGITAL MEMBERSHIP</div>

  <div class="card-level" data-card-level>
    LOADING...
  </div>

  <div class="card-user" data-user-name>
    Your Name
  </div>

</div>

<!-- ===== STATS ===== -->
<div class="grid">

  <div class="box">
    <h3>Points</h3>
    <p data-user-points>0</p>
  </div>

  <div class="box">
    <h3>Level</h3>
    <p data-user-level>0</p>
  </div>

  <div class="box">
    <h3>Wallet</h3>
    <p data-user-wallet>$0</p>
  </div>

  <div class="box">
    <h3>Status</h3>
    <p>Active</p>
  </div>

</div>

</div>

<!-- ===== JS ===== -->
<script src="js/system.js"></script>
<script src="js/premium-effects.js"></script>
<script src="js/global-ui-engine.js"></script>
<script src="js/card-engine.js"></script>
<script src="js/vip-card-levels.js"></script>
<script src="js/store-loader.js"></script>

</body>
</html>
