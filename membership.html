<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Membership</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#060906;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 حركة الضوء الأساسية */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,215,0,.08), transparent);
  animation:bgMove 6s linear infinite;
}

@keyframes bgMove{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  min-height:100vh;
  padding:20px;
  background:rgba(10,15,10,.85);
  border-right:1px solid rgba(255,215,0,.2);
}

.logo{
  color:#FFD700;
  font-weight:900;
  margin-bottom:25px;
}

.nav a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  color:#ccc;
  transition:.25s;
}

.nav a:hover{
  background:rgba(255,215,0,.08);
  color:#FFD700;
  transform:translateX(6px);
}

.nav a.active{
  background:linear-gradient(90deg,#FFD700,#caa300);
  color:#000;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.status{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(0,255,150,.08);
  border:1px solid rgba(0,255,150,.3);
  padding:8px 14px;
  border-radius:20px;
}

/* 🔥 signal animation */
.signal{
  display:flex;
  gap:3px;
}

.signal span{
  width:4px;
  background:#00ff9d;
  animation:signal 1s infinite;
}

.signal span:nth-child(1){height:6px}
.signal span:nth-child(2){height:10px;animation-delay:.2s}
.signal span:nth-child(3){height:14px;animation-delay:.4s}
.signal span:nth-child(4){height:18px;animation-delay:.6s}

@keyframes signal{
  0%,100%{opacity:.3}
  50%{opacity:1}
}

/* ===== CARD ===== */
.card{
  background:rgba(20,25,20,.9);
  border:1px solid rgba(255,215,0,.2);
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}

/* 🔥 حركة الضوء داخل الكارد */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,215,0,.1), transparent);
  animation:shine 5s linear infinite;
}

@keyframes shine{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

/* ===== PROGRESS ===== */
.progress{
  height:8px;
  background:#222;
  border-radius:10px;
  margin-top:10px;
}

.progress span{
  display:block;
  height:100%;
  width:70%;
  background:linear-gradient(90deg,#FFD700,#ffaa00);
}

/* ===== BOX ===== */
.box{
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(255,215,0,.2);
  transition:.3s;
  position:relative;
  overflow:hidden;
}

/* 🔥 hover light */
.box::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,215,0,.1), transparent);
  transform:translateX(-100%);
  transition:.4s;
}

.box:hover::before{
  transform:translateX(100%);
}

.box:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(255,215,0,.25);
}

.box h4{
  color:#FFD700;
  margin-bottom:5px;
}

</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">STYLESphere</div>

    <div class="nav">
      <a href="client-dashboard.html">Dashboard</a>
      <a href="wallet.html">Wallet</a>
      <a href="rewards.html">Rewards</a>
      <a href="qr-access.html">QR Access</a>
      <a href="nfc-card.html">NFC Card</a>
      <a href="activity.html">Activity</a>
      <a class="active" href="membership.html">Membership</a>
      <a href="notifications.html">Notifications</a>
      <a href="settings.html">Settings</a>
      <a href="support.html">Support</a>
      <a href="profile.html">Profile</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="header">
      <h1>Membership</h1>

      <div class="status">
        <div class="signal">
          <span></span><span></span><span></span><span></span>
        </div>
        ACTIVE
      </div>
    </div>

    <!-- CARD -->
    <div class="card">
      <h2>Royal Infinity</h2>
      <p>MOHAMMED GHALEB</p>
    </div>

    <!-- PROGRESS -->
    <div class="card">
      <h3>Progress</h3>
      <div class="progress"><span></span></div>
    </div>

    <!-- BENEFITS -->
    <div class="grid">

      <div class="box">
        <h4>Discounts</h4>
        <p>Member pricing</p>
      </div>

      <div class="box">
        <h4>Rewards</h4>
        <p>Gift system</p>
      </div>

      <div class="box">
        <h4>NFC Card</h4>
        <p>Digital card</p>
      </div>

      <div class="box">
        <h4>Security</h4>
        <p>Verified account</p>
      </div>

    </div>

  </main>

</div>

</body>
</html>
