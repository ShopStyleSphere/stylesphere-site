<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere | Create Account</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  color:white;
  background:
    radial-gradient(circle at top, rgba(212,175,55,.25), transparent 35%),
    linear-gradient(135deg,#050505,#111,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:25px;
}
.wrapper{
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
}
.hero,.form{
  border:1px solid rgba(212,175,55,.45);
  border-radius:28px;
  background:rgba(0,0,0,.58);
  box-shadow:0 0 35px rgba(212,175,55,.22);
  padding:38px;
}
.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.logo{
  font-size:38px;
  color:#d4af37;
  font-weight:900;
  letter-spacing:2px;
}
.hero h1{
  font-size:48px;
  margin:20px 0 10px;
}
.hero p{
  color:#ddd;
  line-height:1.7;
  font-size:17px;
}
.benefits{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.benefit{
  border:1px solid rgba(212,175,55,.35);
  border-radius:18px;
  padding:18px;
  color:#f5d76e;
  background:rgba(255,255,255,.04);
}
.form h2{
  text-align:center;
  font-size:40px;
  color:#d4af37;
  margin:0 0 10px;
}
.form .sub{
  text-align:center;
  color:#ccc;
  margin-bottom:25px;
}
.group{margin-bottom:14px}
label{
  display:block;
  color:#d4af37;
  font-weight:bold;
  margin-bottom:7px;
}
.input{
  display:flex;
  align-items:center;
  gap:12px;
  border:1px solid rgba(212,175,55,.7);
  border-radius:14px;
  padding:0 14px;
  background:rgba(0,0,0,.6);
}
.input i{color:#d4af37}
.input input{
  width:100%;
  padding:15px 0;
  background:transparent;
  border:0;
  outline:0;
  color:white;
  font-size:15px;
}
.eye{cursor:pointer}
.terms{
  display:flex;
  gap:10px;
  align-items:flex-start;
  font-size:14px;
  color:#ddd;
  margin:14px 0;
}
.terms a{color:#d4af37}
.main-btn{
  width:100%;
  padding:16px;
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,#c69214,#fff1a8,#b8860b);
  font-weight:900;
  letter-spacing:4px;
  cursor:pointer;
  margin-top:10px;
}
.divider{
  text-align:center;
  color:#d4af37;
  margin:22px 0 15px;
  font-weight:bold;
}
.socials{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}
.socials button{
  padding:13px;
  border-radius:14px;
  border:1px solid rgba(212,175,55,.55);
  background:rgba(0,0,0,.55);
  color:#d4af37;
  font-weight:bold;
}
.login{
  text-align:center;
  margin-top:20px;
  color:#ddd;
}
.login a{color:#d4af37;font-weight:bold}
.msg{
  text-align:center;
  margin-top:14px;
  font-weight:bold;
}
@media(max-width:850px){
  .wrapper{grid-template-columns:1fr}
  .hero h1{font-size:36px}
}
</style>
</head>

<body>

<div class="wrapper">

  <section class="hero">
    <div class="logo">STYLESPHERE</div>
    <h1>Members Club</h1>
    <p>Create your luxury membership account, unlock VIP rewards, earn points, and access exclusive global benefits.</p>

    <div class="benefits">
      <div class="benefit">👑 VIP Benefits</div>
      <div class="benefit">🌍 Global Access</div>
      <div class="benefit">🎁 Rewards</div>
      <div class="benefit">🔐 Secure Account</div>
    </div>
  </section>

  <section class="form">
    <h2>Create Account</h2>
    <p class="sub">Join StyleSphere Members Club</p>

    <div class="group">
      <label>FULL NAME</label>
      <div class="input">
        <i class="fa fa-user"></i>
        <input id="fullName" type="text" placeholder="Enter your full name">
      </div>
    </div>

    <div class="group">
      <label>EMAIL ADDRESS</label>
      <div class="input">
        <i class="fa fa-envelope"></i>
        <input id="email" type="email" placeholder="Enter your email">
      </div>
    </div>

    <div class="group">
      <label>PASSWORD</label>
      <div class="input">
        <i class="fa fa-lock"></i>
        <input id="password" type="password" placeholder="Enter your password">
        <i class="fa fa-eye eye" onclick="togglePassword('password', this)"></i>
      </div>
    </div>

    <div class="group">
      <label>CONFIRM PASSWORD</label>
      <div class="input">
        <i class="fa fa-shield"></i>
        <input id="confirmPassword" type="password" placeholder="Confirm password">
        <i class="fa fa-eye eye" onclick="togglePassword('confirmPassword', this)"></i>
      </div>
    </div>

    <label class="terms">
      <input id="terms" type="checkbox">
      <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
    </label>

    <button class="main-btn" onclick="register()">CREATE ACCOUNT →</button>

    <div class="divider">OR CONTINUE WITH</div>

    <div class="socials">
      <button type="button"><i class="fab fa-google"></i> Google</button>
      <button type="button"><i class="fab fa-apple"></i> Apple</button>
      <button type="button"><i class="fab fa-facebook-f"></i> Facebook</button>
    </div>

    <div class="login">
      Already have an account? <a href="client-login.html">Login</a>
    </div>

    <div id="msg" class="msg"></div>
  </section>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtTzgyj4j06twWXbu0BjOHZjNfjzE0kV8",
  authDomain: "stylesphere-81dfe.firebaseapp.com",
  projectId: "stylesphere-81dfe",
  storageBucket: "stylesphere-81dfe.firebasestorage.app",
  messagingSenderId: "545255416631",
  appId: "1:545255416631:web:d4b82393bb70e92e05b0b2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.togglePassword = function(id, icon){
  const input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  }else{
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
};

window.register = function(){
  const name = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const terms = document.getElementById("terms").checked;
  const msg = document.getElementById("msg");

  msg.style.color = "#ff6b6b";

  if(!name || !email || !password || !confirmPassword){
    msg.innerText = "Please complete all fields.";
    return;
  }

  if(password.length < 6){
    msg.innerText = "Password must be at least 6 characters.";
    return;
  }

  if(password !== confirmPassword){
    msg.innerText = "Passwords do not match.";
    return;
  }

  if(!terms){
    msg.innerText = "Please accept Terms & Privacy Policy.";
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      return updateProfile(userCredential.user, { displayName: name })
        .then(() => sendEmailVerification(userCredential.user));
    })
    .then(() => {
      msg.style.color = "#00ff99";
      msg.innerText = "Account created. Check your email to verify.";
      setTimeout(() => {
        window.location.href = "client-login.html";
      }, 2500);
    })
    .catch((error) => {
      msg.innerText = error.message;
    });
};
</script>

</body>
</html>
