<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleSphere | VIP System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ========== GLOBAL SYSTEM ========== */
:root{
  --gold:#d4af37;
  --bg:#020202;
  --glass:rgba(0,0,0,.75);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:#fff;
  font-family:Arial;
  overflow-x:hidden;
}

/* 🔥 Smart Light Engine (مرتبط بالماوس) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at var(--x,50%) var(--y,50%),
  rgba(255,215,0,.15), transparent 40%);
  z-index:-1;
}

/* ========== LAYOUT SYSTEM ========== */
.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:20px;
  padding:20px;
}

/* ========== SIDEBAR (REAL SYSTEM) ========== */
.sidebar{
  background:var(--glass);
  border:1px solid rgba(255,215,0,.3);
  border-radius:25px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,215,0,.1);
}

/* ========== MAIN ========== */
.main{
  display:grid;
  gap:20px;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:var(--gold);
  font-size:30px;
  font-weight:900;
}

.status{
  color:#00ff9d;
  font-weight:bold;
}

/* ========== VIP GRID SYSTEM ========== */
.vip-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* ========== VIP CARD (CONNECTED WITH JS) ========== */
.vip-card{
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,215,0,.4);
  border-radius:20px;
  padding:20px;
  transition:.3s;
  position:relative;
}

.vip-card:hover{
  transform:translateY(-5px);
}

/* Dynamic Data */
.card-brand{
  color:var(--gold);
  font-size:12px;
  font-weight:bold;
}

.level-name{
  font-size:18px;
  margin-top:10px;
}

.points{
  color:#aaa;
  font-size:14px;
}

/* NFC */
.nfc-chip{
  width:40px;
  height:25px;
  background:gold;
  border-radius:6px;
  margin-top:10px;
}

/* Responsive */
@media(max-width:1000px){
  .layout{grid-template-columns:1fr}
  .vip-grid{grid-template-columns:repeat(2,1fr)}
}

</style>
</head>

<body>

<div class="layout">

<!-- 🔥 SIDEBAR (يتم توليدها من sidebar.js) -->
<aside class="sidebar" id="sidebar"></aside>

<!-- MAIN -->
<main class="main">

<div class="header">
  <div class="logo">STYLESPHERE</div>
  <div class="status">● SYSTEM ONLINE</div>
</div>

<h2>VIP LEVEL SYSTEM</h2>

<!-- 🔥 GRID -->
<div class="vip-grid" id="vipContainer"></div>

</main>
</div>

<!-- ========== SYSTEM FILES ========== -->
<script src="js/system.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/premium-effects.js"></script>
<script src="js/vip-card-levels.js"></script>

<script>

/* =========================
   REAL SYSTEM ENGINE
========================= */

/* تحميل المستخدم */
let user = null;

if(window.SS){
  user = SS.getUser();
}

/* تحميل مستويات VIP من النظام */
const container = document.getElementById("vipContainer");

if(window.StyleSphereVIPLevels){

  const levels = window.StyleSphereVIPLevels.levels;

  levels.forEach(level=>{

    const card = document.createElement("div");
    card.className="vip-card";
    card.setAttribute("data-vip-card","");

    card.innerHTML=`
      <div class="card-brand">STYLESPHERE</div>

      <div class="level-name" data-card-level>
        ${level.name}
      </div>

      <div class="points">
        ${level.points}+ Points
      </div>

      <div class="nfc-chip" data-card-chip></div>
    `;

    container.appendChild(card);
  });

  /* 🔥 تطبيق النظام (الألوان + glow) */
  window.StyleSphereVIPLevels.refresh();
}

/* =========================
   LIGHT SYSTEM (GLOBAL)
========================= */

document.addEventListener("mousemove",(e)=>{
  document.body.style.setProperty("--x",e.clientX+"px");
  document.body.style.setProperty("--y",e.clientY+"px");
});

</script>

</body>
</html>
