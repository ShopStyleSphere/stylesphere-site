<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere Elite System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#000;color:#fff;overflow-x:hidden}

/* 🎥 فيديو */
video{
position:fixed;inset:0;width:100%;height:100%;
object-fit:cover;z-index:-3;filter:brightness(.6)
}

/* 🌌 تأثير */
body::before{
content:"";
position:fixed;inset:0;
background:radial-gradient(circle at center,rgba(255,215,80,.2),transparent 60%);
z-index:-2;
}

/* 🔥 Glow */
.glow{
position:fixed;inset:0;
background:linear-gradient(120deg,transparent,rgba(255,215,80,.2),transparent);
animation:move 6s linear infinite;
z-index:-1;
}
@keyframes move{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* 📦 Container */
.container{max-width:1200px;margin:auto;padding:40px}

/* 🧠 Header */
.header{text-align:center;margin-bottom:50px}
.logo{
font-size:40px;
letter-spacing:12px;
color:#ffd84d;
text-shadow:0 0 30px #ffd84d;
}
.title{
font-size:50px;
margin-top:30px;
font-weight:800;
}

/* ⚡ badges */
.badges{
display:flex;justify-content:center;gap:15px;margin-top:20px
}
.badge{
padding:10px 20px;
border-radius:40px;
border:1px solid #ffd84d;
box-shadow:0 0 20px rgba(255,215,80,.3);
}

/* 🧊 Cards */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
margin-top:40px;
}

.card{
background:rgba(0,0,0,.6);
border-radius:20px;
padding:25px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,80,.3);
transition:.4s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,215,80,.3),transparent);
opacity:0;
transition:.4s;
}
.card:hover::before{opacity:1}
.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 40px rgba(255,215,80,.4);
}

/* 📝 Inputs */
input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #333;
background:#111;
color:#fff;
}
input:focus{
outline:none;
border-color:#ffd84d;
box-shadow:0 0 10px #ffd84d;
}

/* 🔘 Button */
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ffd84d,#a67c00);
color:#000;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

/* 📊 Stats */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:40px;
}
.stat{
background:rgba(0,0,0,.5);
padding:20px;
border-radius:15px;
text-align:center;
border:1px solid rgba(255,215,80,.2);
}
.stat h2{color:#ffd84d}

/* 📱 Responsive */
@media(max-width:900px){
.grid,.stats{grid-template-columns:1fr}
.title{font-size:35px}
}
</style>
</head>

<body>

<video autoplay muted loop>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="glow"></div>

<div class="container">

<div class="header">
<div class="logo">STYLESPHERE</div>
<h1 class="title">Elite Access System</h1>

<div class="badges">
<div class="badge">Secure</div>
<div class="badge">Fast</div>
<div class="badge">Global</div>
</div>
</div>

<div class="grid">

<div class="card">
<h2>Client</h2>
<input placeholder="Email">
<input type="password" placeholder="Password">
<button>Login</button>
</div>

<div class="card">
<h2>Merchant</h2>
<input placeholder="Email">
<input type="password" placeholder="Password">
<button>Verify</button>
</div>

<div class="card">
<h2>Admin</h2>
<input placeholder="Email">
<input type="password" placeholder="Password">
<input placeholder="2FA">
<button>Enter</button>
</div>

</div>

<div class="stats">
<div class="stat"><h2>24K</h2><p>Users</p></div>
<div class="stat"><h2>1.2K</h2><p>Merchants</p></div>
<div class="stat"><h2>99.9%</h2><p>Uptime</p></div>
<div class="stat"><h2>152</h2><p>Countries</p></div>
</div>

</div>

</body>
</html>
