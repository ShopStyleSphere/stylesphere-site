<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere Elite System</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 🔥 VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.25);
}

/* 🔥 HERO */
.hero {
  text-align: center;
  padding: 100px 20px 50px;
}

.logo {
  font-size: 40px;
  letter-spacing: 8px;
  color: #d4af37;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 25px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

/* 🔥 BADGES */
.badges {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.badge {
  padding: 10px 18px;
  border-radius: 20px;
  border: 1px solid #d4af37;
  color: #d4af37;
  backdrop-filter: blur(10px);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #d4af37; }
  to { box-shadow: 0 0 25px #d4af37; }
}

/* 🔥 WORLD GLOW NETWORK */
.network {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background:
    radial-gradient(circle at 30% 40%, rgba(212,175,55,0.2), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(212,175,55,0.2), transparent 40%);
  animation: move 10s linear infinite;
}

@keyframes move {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50px); }
}

/* 🔥 LOGIN CARDS */
.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 40px;
}

.card {
  background: rgba(0,0,0,0.6);
  border-radius: 25px;
  padding: 25px;
  border: 1px solid rgba(212,175,55,0.2);
  backdrop-filter: blur(15px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 0 40px rgba(212,175,55,0.5);
}

.card h2 {
  color: #d4af37;
  margin-bottom: 10px;
}

.card p {
  color: #aaa;
  margin-bottom: 15px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #333;
  background: rgba(0,0,0,0.6);
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#d4af37,#ffd700);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 25px gold;
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  text-align: center;
  margin: 40px 0;
  color: #aaa;
}

@media(max-width:900px){
  .container {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- 🔥 VIDEO BACKGROUND -->
<div class="video-bg">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-night-city-traffic-5175/1080p.mp4" type="video/mp4">
  </video>
</div>

<div class="network"></div>

<!-- 🔥 HERO -->
<div class="hero">
  <div class="logo">STYLESPHERE</div>
  <div class="subtitle">MEMBERS CLUB</div>

  <h1>Smart & Secure Access System</h1>

  <div class="badges">
    <div class="badge">Secure</div>
    <div class="badge">Fast Access</div>
    <div class="badge">Global System</div>
  </div>
</div>

<!-- 🔥 LOGIN -->
<div class="container">

  <!-- CLIENT -->
  <div class="card">
    <h2>Client Login</h2>
    <p>Membership & Rewards</p>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>

  <!-- MERCHANT -->
  <div class="card">
    <h2>Merchant Login</h2>
    <p>QR Scan & Verify</p>
    <input placeholder="Merchant Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>

  <!-- ADMIN -->
  <div class="card">
    <h2>Admin Panel</h2>
    <p>Full Control System</p>
    <input placeholder="Admin Email">
    <input type="password" placeholder="Password">
    <input placeholder="2FA Code">
    <button>Enter Dashboard</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  256-bit Encryption • Global Servers • Real-time Monitoring
</div>

</body>
</html>
