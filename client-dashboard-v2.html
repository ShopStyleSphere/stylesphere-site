<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StyleSphere | Client Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0b0f14;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      padding: 8px 15px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: bold;
      background: #111;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    .card {
      margin-top: 20px;
      background: linear-gradient(135deg, #00ffcc, #0066ff);
      border-radius: 20px;
      padding: 20px;
      color: black;
    }

    .balance {
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .box {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid #222;
    }

    .box h3 {
      margin: 10px 0 5px;
      font-size: 16px;
    }

    .box p {
      font-size: 12px;
      color: #aaa;
    }

    .box:hover {
      border: 1px solid #00ffcc;
      transform: scale(1.03);
      transition: 0.3s;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="top-bar">
    <h2>StyleSphere</h2>
    <div id="systemStatus" class="status">🔄 CONNECTING...</div>
  </div>

  <!-- CARD -->
  <div class="card">
    <h3>GLOBAL MEMBER</h3>
    <div id="balance" class="balance">$0.00</div>

    <p>Member No: <span id="memberNo">----</span></p>
    <p>Wallet No: <span id="walletNo">----</span></p>
  </div>

  <!-- ACTIONS -->
  <div class="grid">

    <div class="box">
      <h3>Wallet</h3>
      <p>Manage balance</p>
    </div>

    <div class="box">
      <h3>QR Access</h3>
      <p>Scan & Enter</p>
    </div>

    <div class="box">
      <h3>NFC Card</h3>
      <p>Request card</p>
    </div>

    <div class="box">
      <h3>Biometric</h3>
      <p>Face / Fingerprint</p>
    </div>

    <div class="box">
      <h3>Activity</h3>
      <p>Account history</p>
    </div>

    <div class="box">
      <h3>Settings</h3>
      <p>Account control</p>
    </div>

  </div>

</div>

<!-- Firebase -->
<script type="module">

import { db } from "./js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth();


// ✅ SYSTEM STATUS
const systemRef = doc(db, "system", "status");

onSnapshot(systemRef, (snap) => {
  if (!snap.exists()) return;

  const state = snap.data().state;
  const el = document.getElementById("systemStatus");

  if (state === "online") {
    el.innerHTML = "🟢 SYSTEM ONLINE";
  } else if (state === "issue") {
    el.innerHTML = "🟡 SYSTEM ISSUE";
  } else {
    el.innerHTML = "🔴 SYSTEM OFFLINE";
  }
});


// ✅ USER DATA
onAuthStateChanged(auth, (user) => {
  if (!user) return;

  const userRef = doc(db, "users", user.uid);

  onSnapshot(userRef, (snap) => {
    if (!snap.exists()) return;

    const data = snap.data();

    document.getElementById("balance").innerText = `$${data.wallet || 0}`;
    document.getElementById("memberNo").innerText = data.memberNo || "—";
    document.getElementById("walletNo").innerText = data.walletNo || "—";
  });

});

</script>

</body>
</html>
