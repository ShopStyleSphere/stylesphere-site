<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - StyleSphere</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050505;
  font-family:Arial;
  color:white;
}

.box {
  padding:40px;
  border-radius:25px;
  background:#111;
  border:1px solid rgba(255,215,0,0.3);
  box-shadow:0 0 40px rgba(255,215,0,0.2);
  width:90%;
  max-width:420px;
  text-align:center;
}

h1 {
  color:#ffd700;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.4);
  background:#050505;
  color:white;
  font-size:16px;
}

button {
  width:100%;
  padding:15px;
  border-radius:12px;
  border:0;
  background:#ffd700;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

#status {
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h1>Reset Password</h1>

  <input id="password" type="password" placeholder="New password">

<div id="rules">
  <p id="ruleLength">❌ 8 characters minimum</p>
  <p id="ruleUpper">❌ Uppercase letter</p>
  <p id="ruleLower">❌ Lowercase letter</p>
  <p id="ruleNumber">❌ Number</p>
  <p id="ruleSymbol">❌ Symbol (@, #, $, !)</p>
</div>
  
  <input id="confirmPassword" type="password" placeholder="Confirm password">

  <button id="btn">Update Password</button>

  <p id="status"></p>
</div>

<script type="module">
import { auth } from "./js/firebase.js";
import { confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

// قراءة الرابط
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

// 🔴 تحقق من الرابط
if (mode !== "resetPassword" || !oobCode) {
  status.style.color = "red";
  status.textContent = "❌ Invalid or expired link";
  btn.disabled = true;
}

// زر التحديث
btn.addEventListener("click", async () => {

  const pass = password.value;
  const confirm = confirmPassword.value;

  if (!pass || !confirm) {
    status.textContent = "Please fill all fields";
    return;
  }

// تحقق من قوة الباسورد
if (
  pass.length < 8 ||
  !/[A-Z]/.test(pass) ||
  !/[a-z]/.test(pass) ||
  !/[0-9]/.test(pass) ||
  !/[@#$!]/.test(pass)
) {
  status.style.color = "red";
  status.textContent =
    "Password must be 8+ characters with uppercase, lowercase, number, and symbol.";
  return;
}

// تحقق من التطابق
if (pass !== confirm) {
  status.style.color = "red";
  status.textContent = "Passwords do not match";
  return;
}
  
  try {
    await confirmPasswordReset(auth, oobCode, pass);

    status.style.color = "#00ff99";
    status.textContent = "✅ Password updated successfully";

    setTimeout(() => {
      window.location.href = "client-login.html";
    }, 1500);

  } catch (err) {
    status.style.color = "red";
    status.textContent = "❌ Invalid or expired link";
  }
});
</script>

</body>
</html>
