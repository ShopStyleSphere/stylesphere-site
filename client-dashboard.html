<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere | Client Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0f14;color:white}

.container{padding:30px}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#f4d84a;
}

.status{
  padding:10px 20px;
  border-radius:20px;
  background:#002f26;
  color:#00ffae;
  font-weight:bold;
}

.card{
  background:linear-gradient(135deg,#00ffc3,#008cff);
  color:black;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

.balance{
  font-size:42px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.box{
  background:#111;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">STYLESPHERE</div>
  <div id="systemStatus" class="status">CONNECTING...</div>
</div>

<h2>Welcome, <span id="userName">Client</span></h2>

<div class="card">
  <p>Wallet Balance</p>
  <div id="walletBalance" class="balance">$0</div>
</div>

<button id="topupBtn">Top-up Request</button>

<div class="grid">
  <div class="box" id="qrBtn">QR Access</div>
  <div class="box" id="nfcBtn">NFC Card</div>
  <div class="box" id="bioBtn">Biometric</div>
  <div class="box">Activity</div>
</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc,
  onSnapshot,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// عناصر
const walletEl = document.getElementById("walletBalance");
const nameEl = document.getElementById("userName");
const statusEl = document.getElementById("systemStatus");

// 🔒 تحقق تسجيل الدخول
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "client-login.html";
    return;
  }

  nameEl.innerText = user.email;

  // 💰 Wallet
  const userRef = doc(db, "users", user.uid);

  onSnapshot(userRef, (snap) => {
    if (!snap.exists()) return;

    const data = snap.data();
    walletEl.innerText = "$" + (data.wallet || 0);
  });

  // 💸 Top-up
  document.getElementById("topupBtn").onclick = async () => {
    await addDoc(collection(db, "topup_requests"), {
      uid: user.uid,
      amount: 100,
      currency: "USD",
      status: "pending",
      type: "top_up",
      createdAt: serverTimestamp()
    });
    alert("Top-up request sent");
  };

  // QR
  document.getElementById("qrBtn").onclick = async () => {
    await addDoc(collection(db, "qr_requests"), {
      uid: user.uid,
      status: "pending",
      type: "qr_access",
      createdAt: serverTimestamp()
    });
    alert("QR request sent");
  };

  // NFC
  document.getElementById("nfcBtn").onclick = async () => {
    await addDoc(collection(db, "nfc_requests"), {
      uid: user.uid,
      status: "pending",
      type: "nfc_card",
      createdAt: serverTimestamp()
    });
    alert("NFC request sent");
  };

  // Biometric
  document.getElementById("bioBtn").onclick = async () => {
    await addDoc(collection(db, "biometric_requests"), {
      uid: user.uid,
      status: "pending",
      type: "biometric_access",
      createdAt: serverTimestamp()
    });
    alert("Biometric request sent");
  };

});

// 🟢 System status
onSnapshot(doc(db, "system", "status"), (snap) => {
  if (!snap.exists()) return;

  const state = snap.data().state;

  if (state === "online") {
    statusEl.innerText = "🟢 SYSTEM ONLINE";
  } else if (state === "issue") {
    statusEl.innerText = "🟡 SYSTEM ISSUE";
  } else {
    statusEl.innerText = "🔴 SYSTEM OFFLINE";
  }
});

</script>

</body>
</html>
