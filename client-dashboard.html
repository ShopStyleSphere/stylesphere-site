<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StyleSphere Client Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
}

.container {
    padding: 30px;
}

.status {
    background: #1a2a1a;
    padding: 10px 20px;
    display: inline-block;
    border-radius: 20px;
    color: #00ff88;
    margin-bottom: 20px;
}

.card {
    background: linear-gradient(135deg,#00ffc3,#008cff);
    padding: 20px;
    border-radius: 15px;
    color: black;
    width: 300px;
    margin-bottom: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

<div id="status" class="status">CONNECTING...</div>

<h2>Welcome, Client</h2>

<div class="card">
    <h3>Wallet Balance</h3>
    <h1 id="balance">$0</h1>
</div>

<button id="topupBtn">Top-up Request</button>

</div>

<script type="module">

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔐 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "stylesphere-81dfe.firebaseapp.com",
  projectId: "stylesphere-81dfe",
  storageBucket: "stylesphere-81dfe.appspot.com",
  messagingSenderId: "545255416631",
  appId: "1:545255416631:web:d4b82393bb70e92e05b0b2"
};

// 🚀 Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// عناصر الصفحة
const statusBox = document.getElementById("status");
const balanceEl = document.getElementById("balance");
const topupBtn = document.getElementById("topupBtn");

// 🟢 حالة النظام
const systemRef = doc(db, "system", "status");

onSnapshot(systemRef, (snap) => {
    if (snap.exists()) {
        statusBox.innerText = "SYSTEM ONLINE";
        statusBox.style.background = "#003d2a";
    }
});

// 👤 المستخدم
onAuthStateChanged(auth, (user) => {

    if (!user) {
        alert("Login required");
        return;
    }

    // 🔄 تحديث الرصيد مباشر
    const userRef = doc(db, "users", user.uid);

    onSnapshot(userRef, (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            balanceEl.innerText = "$" + (data.wallet || 0);
        }
    });

    // 💰 طلب شحن
    topupBtn.onclick = async () => {
        await addDoc(collection(db, "topup_requests"), {
            uid: user.uid,
            amount: 100,
            currency: "USD",
            status: "pending",
            type: "topup",
            createdAt: serverTimestamp()
        });

        alert("Top-up request sent");
    };

});

</script>

</body>
</html>
