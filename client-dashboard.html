<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StyleSphere Client Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:#0b0f14;
  color:#fff;
}

/* Layout */
.container{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:#0e1319;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#d4af37;
  margin-bottom:30px;
}

.profile{
  text-align:center;
  margin-bottom:30px;
}

.profile img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #d4af37;
  margin-bottom:10px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button{
  background:none;
  border:none;
  color:#aaa;
  text-align:left;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.menu button:hover{
  background:#1a222c;
  color:#fff;
}

/* Main */
.main{
  flex:1;
  padding:30px;
}

/* Top */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

/* Status */
.system-status{
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
  border:1px solid;
}

.status-online{
  color:#00ff9c;
  border-color:#00ff9c;
}

.status-warning{
  color:#ffcc00;
  border-color:#ffcc00;
}

.status-offline{
  color:#ff3b3b;
  border-color:#ff3b3b;
}

/* Cards */
.card{
  background:#111820;
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
  margin-bottom:20px;
}

/* Wallet Card */
.wallet-card{
  background:linear-gradient(135deg,#d4af37,#0f3d2e);
  color:#000;
  border-radius:18px;
  padding:20px;
}

.wallet-card h2{
  margin-top:10px;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

/* Small cards */
.box{
  background:#111820;
  padding:18px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
}

.box h3{
  font-size:14px;
  color:#aaa;
}

.box p{
  font-size:18px;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">

<div class="logo">STYLESHPERE</div>

<div class="profile">
<img id="userPhoto" src="https://via.placeholder.com/80">
<div id="userName">Client</div>
<div id="userEmail" style="font-size:12px;color:#888"></div>
</div>

<div class="menu">
<button>Dashboard</button>
<button>Wallet</button>
<button>Rewards</button>
<button>QR Access</button>
<button>Settings</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<!-- Main -->
<div class="main">

<div class="topbar">
<h2>Client Dashboard</h2>

<div id="systemStatus" class="system-status status-online">
● SYSTEM ONLINE
</div>

</div>

<!-- Wallet -->
<div class="wallet-card">
<div>STYLESHPERE • GLOBAL MEMBER</div>
<h2 id="balance">$0.00</h2>
<div id="walletNo">Wallet No: ----</div>
</div>

<!-- Info -->
<div class="grid">

<div class="box">
<h3>Member No</h3>
<p id="customerNo">----</p>
</div>

<div class="box">
<h3>Security</h3>
<p>Active</p>
</div>

<div class="box">
<h3>NFC Card</h3>
<p>Not Requested</p>
</div>

<div class="box">
<h3>Activity</h3>
<p>Normal</p>
</div>

</div>

</div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* Auth */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location="client-login.html";
    return;
  }

  document.getElementById("userName").innerText = user.displayName || "Client";
  document.getElementById("userEmail").innerText = user.email;

  if(user.photoURL){
    document.getElementById("userPhoto").src = user.photoURL;
  }

  /* Load user data */
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();

    document.getElementById("balance").innerText = "$"+data.balance;
    document.getElementById("walletNo").innerText = "Wallet No: "+data.walletNo;
    document.getElementById("customerNo").innerText = data.customerNo;
  }
});

/* System status realtime */
onSnapshot(doc(db,"system","status"),(docSnap)=>{
  if(!docSnap.exists()) return;

  const state = docSnap.data().state;
  const el = document.getElementById("systemStatus");

  el.className = "system-status";

  if(state==="online"){
    el.classList.add("status-online");
    el.innerHTML="● SYSTEM ONLINE";
  }

  if(state==="warning"){
    el.classList.add("status-warning");
    el.innerHTML="● SYSTEM ISSUE";
  }

  if(state==="offline"){
    el.classList.add("status-offline");
    el.innerHTML="● SYSTEM OFFLINE";
  }
});

/* Logout */
window.logout = ()=>{
  signOut(auth);
};

</script>

</body>
</html>
