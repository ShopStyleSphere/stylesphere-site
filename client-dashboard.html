<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StyleSphere Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #fff;
}

.container {
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: gold;
}

/* User Card */
.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: linear-gradient(145deg, #111, #1a1a1a);
  box-shadow: 0 0 20px rgba(255,215,0,0.1);
}

.card h2 {
  margin: 0;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.box {
  padding: 20px;
  border-radius: 15px;
  background: #121212;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.box:hover {
  background: #1f1f1f;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px;
  border: none;
  width: 100%;
  border-radius: 10px;
  background: gold;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo">StyleSphere</div>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- User Info -->
  <div class="card">
    <h2 id="name">Loading...</h2>
    <p id="email"></p>
  </div>

  <!-- Features -->
  <div class="grid">

    <div class="box" onclick="go('wallet.html')">
      💳 Wallet
    </div>

    <div class="box" onclick="go('qr.html')">
      📱 QR Access
    </div>

    <div class="box" onclick="go('nfc.html')">
      📡 NFC Card
    </div>

    <div class="box" onclick="go('activity.html')">
      📊 Activity
    </div>

  </div>

</div>

<script type="module">

import {
  auth
} from "./js/firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

// حماية الصفحة
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("name").innerText = user.displayName || "User";
    document.getElementById("email").innerText = user.email;
  }
});

// تنقل
window.go = (page) => {
  window.location.href = page;
};

// تسجيل خروج
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

</script>

</body>
</html>
