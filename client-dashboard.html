<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleSphere Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  overflow:hidden;
  color:#fff;
}

/* 🔥 خلفية متحركة */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
  radial-gradient(circle at var(--x) var(--y), rgba(255,215,0,.25), transparent 25%),
  linear-gradient(135deg,#000,#080603,#000);
}

/* الحاوية */
.container{
  width:1200px;
  display:flex;
  gap:30px;
}

/* البوكس */
.box{
  flex:1;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,215,0,.3);
  box-shadow:0 0 20px rgba(255,215,0,.2);
}

/* العنوان */
.title{
  font-size:40px;
  color:gold;
  margin-bottom:20px;
  text-shadow:0 0 20px gold;
}

/* البطاقة */
.vip-card{
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#111,#222);
  box-shadow:0 0 30px gold;
  transition:.2s;
}

.vip-card h3{
  color:gold;
}

.card-number{
  margin-top:20px;
  letter-spacing:3px;
  font-size:18px;
}

/* الفورم */
.input{
  margin-top:20px;
}

.input input{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(255,215,0,.4);
  background:transparent;
  color:#fff;
  outline:none;
}

/* زر */
.btn{
  margin-top:25px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:gold;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  box-shadow:0 0 30px gold;
}

/* زر تسجيل */
.register{
  margin-top:15px;
  text-align:center;
}

.register a{
  color:gold;
  text-decoration:none;
}

/* الحالة */
.status{
  position:absolute;
  top:20px;
  right:20px;
  padding:10px 20px;
  border-radius:20px;
  background:#0f0;
  color:#000;
  font-weight:bold;
  box-shadow:0 0 20px #0f0;
}

</style>
</head>

<body>

<div class="status">● STORE ONLINE</div>

<div class="container">

  <!-- اليسار -->
  <div class="box">
    <div class="title">BEYOND REWARDS</div>
    <p>Join a world of luxury rewards and exclusive experiences.</p>

    <div class="vip-card">
      <h3>STYLESPHERE</h3>
      <p>Royal Infinity Member</p>
      <div class="card-number">5412 7512 3412 3488</div>
    </div>

  </div>

  <!-- اليمين -->
  <div class="box">
    <div class="title">CLIENT LOGIN</div>

    <div class="input">
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input">
      <input type="password" placeholder="Enter your password">
    </div>

    <button class="btn">LOGIN</button>

    <div class="register">
      Don't have an account?
      <a href="register.html">Create Account</a>
    </div>

  </div>

</div>

<script>

/* 🔥 حركة الخلفية */
document.addEventListener("mousemove", (e)=>{
  document.body.style.setProperty('--x', e.clientX + 'px');
  document.body.style.setProperty('--y', e.clientY + 'px');
});

/* 🔥 حركة البطاقة */
const card = document.querySelector(".vip-card");

card.addEventListener("mousemove", (e)=>{
  let x = e.offsetX;
  let y = e.offsetY;

  let rotateY = (x / card.offsetWidth - 0.5) * 20;
  let rotateX = (y / card.offsetHeight - 0.5) * -20;

  card.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg) scale(1.05)`;
});

card.addEventListener("mouseenter", ()=>{
  card.style.boxShadow="0 0 80px gold, 0 0 120px rgba(255,215,0,.4)";
});

card.addEventListener("mouseleave", ()=>{
  card.style.transform="rotateY(0) rotateX(0)";
  card.style.boxShadow="0 0 30px gold";
});

</script>

</body>
</html>
