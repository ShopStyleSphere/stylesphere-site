<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email | StyleSphere</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#2b230f,#050505 55%,#000);
  color:white;
  font-family:Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:92%;
  max-width:460px;
  padding:38px 28px;
  text-align:center;
  border:1px solid rgba(255,215,90,.35);
  border-radius:26px;
  background:rgba(10,10,10,.82);
  box-shadow:0 0 55px rgba(255,200,40,.22);
}
.logo{
  font-family:Georgia,serif;
  font-size:30px;
  color:#ffd866;
  letter-spacing:3px;
  margin-bottom:12px;
}
.badge{
  width:76px;
  height:76px;
  margin:0 auto 18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  background:linear-gradient(135deg,#b88718,#fff2a8,#c79628);
  color:#111;
  box-shadow:0 0 35px rgba(255,215,0,.45);
}
h1{
  margin:8px 0;
  font-size:28px;
}
p{
  color:#d8d8d8;
  line-height:1.6;
  font-size:15px;
}
button{
  margin-top:22px;
  width:100%;
  height:58px;
  border:0;
  border-radius:16px;
  cursor:pointer;
  font-size:17px;
  font-weight:900;
  letter-spacing:2px;
  color:#111;
  background:linear-gradient(120deg,#d89b19,#fff2a8,#c88b13);
  box-shadow:0 0 30px rgba(255,215,0,.38);
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.msg{
  margin-top:20px;
  font-weight:bold;
  min-height:24px;
}
.success{color:#00ff9d}
.error{color:#ff5a5a}
.small{
  margin-top:22px;
  font-size:13px;
  color:#999;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">STYLESPHERE</div>
  <div class="badge">✓</div>

  <h1>Verify Your Email</h1>
  <p>Confirm your email address to activate your StyleSphere Members Club account.</p>

  <button id="verifyBtn" onclick="confirmEmail()">CONFIRM EMAIL →</button>

  <div id="msg" class="msg"></div>

  <div class="small">Secure verification powered by StyleSphere</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "حط_API_KEY_هنا",
  authDomain: "stylesphere-81dfe.firebaseapp.com",
  projectId: "stylesphere-81dfe",
  storageBucket: "stylesphere-81dfe.firebasestorage.app",
  messagingSenderId: "545255416631",
  appId: "1:545255416631:web:d4b82393bb70e92e05b0b2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.confirmEmail = async function () {
  const btn = document.getElementById("verifyBtn");
  const msg = document.getElementById("msg");

  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get("oobCode");

  if (!oobCode) {
    msg.className = "msg error";
    msg.innerText = "Invalid verification link.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "VERIFYING...";

  try {
    await applyActionCode(auth, oobCode);
    msg.className = "msg success";
    msg.innerText = "Email verified successfully ✅";

    setTimeout(() => {
      window.location.href = "client-login.html";
    }, 2500);

  } catch (error) {
    msg.className = "msg error";
    msg.innerText = "Verification failed: " + error.message;
    btn.disabled = false;
    btn.innerText = "CONFIRM EMAIL →";
  }
};
</script>

</body>
</html>
