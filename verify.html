<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Verification - StyleSphere</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050505;
  font-family:Arial;
  color:white;
}

.box {
  padding:40px;
  border-radius:25px;
  background:#111;
  border:1px solid rgba(255,215,0,0.3);
  box-shadow:0 0 40px rgba(255,215,0,0.2);
  width:90%;
  max-width:420px;
  text-align:center;
}

h1 {
  color:#ffd700;
  margin-bottom:20px;
}

#status {
  font-size:16px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
  <h1>StyleSphere</h1>
  <p id="status">⏳ Verifying your email...</p>
</div>

<script type="module">
import { auth } from "./js/firebase.js";
import { applyActionCode } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const status = document.getElementById("status");

const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");

// 🔐 تحقق من الرابط
if (mode !== "verifyEmail" || !oobCode) {
  status.style.color = "red";
  status.textContent = "❌ Invalid or expired link";
} else {
  try {
    await applyActionCode(auth, oobCode);

    status.style.color = "#00ff99";
    status.textContent = "✅ Email verified successfully";

    // تحويل تلقائي
    setTimeout(() => {
      window.location.replace("client-login.html");
    }, 1500);

  } catch (err) {
    status.style.color = "red";
    status.textContent = "❌ Invalid or expired link";
  }
}
</script>

</body>
</html>
