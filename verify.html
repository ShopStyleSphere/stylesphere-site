<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, applyActionCode } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config (حط بياناتك هنا)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// نقرأ الكود من الرابط
const urlParams = new URLSearchParams(window.location.search);
const oobCode = urlParams.get("oobCode");

if (oobCode) {
  applyActionCode(auth, oobCode)
    .then(() => {
      document.querySelector(".status").innerText = "✅ Email Verified Successfully";
    })
    .catch((error) => {
      document.querySelector(".status").innerText = "❌ Verification Failed";
      console.error(error);
    });
}
</script>
